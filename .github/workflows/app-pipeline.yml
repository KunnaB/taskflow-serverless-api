name: App Pipeline (Lambda Deployment)

on:
  pull_request:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'tests/**'
      - '.github/workflows/app-pipeline.yml'
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'tests/**'
      - '.github/workflows/app-pipeline.yml'

env:
  AWS_REGION: us-east-1

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install boto3 moto pytest requests
      
      - name: Run unit tests
        run: |
          python3 tests/test_create_task.py
      
      - name: Run integration tests
        run: |
          python3 tests/test_integration.py
        env:
          API_URL: https://nqo9rfa75i.execute-api.us-east-1.amazonaws.com/prod/tasks

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Package Lambda functions
        run: |
          cd lambda/create-task && zip -r ../../create-task.zip . && cd ../..
          cd lambda/get-tasks && zip -r ../../get-tasks.zip . && cd ../..
          cd lambda/update-task && zip -r ../../update-task.zip . && cd ../..
          cd lambda/delete-task && zip -r ../../delete-task.zip . && cd ../..
          cd lambda/sqs-worker && zip -r ../../sqs-worker.zip . && cd ../..
      
      - name: Deploy to Staging (Lambda versions)
        run: |
          # Update each Lambda function and publish new version
          aws lambda update-function-code \
            --function-name create-task \
            --zip-file fileb://create-task.zip \
            --publish
          
          aws lambda update-function-code \
            --function-name get-tasks \
            --zip-file fileb://get-tasks.zip \
            --publish
          
          aws lambda update-function-code \
            --function-name update-task \
            --zip-file fileb://update-task.zip \
            --publish
          
          aws lambda update-function-code \
            --function-name delete-task \
            --zip-file fileb://delete-task.zip \
            --publish
          
          aws lambda update-function-code \
            --function-name sqs-worker \
            --zip-file fileb://sqs-worker.zip \
            --publish
      
      - name: Update staging alias to new versions
        run: |
          # Get latest versions
          CREATE_VERSION=$(aws lambda list-versions-by-function --function-name create-task --query 'Versions[-1].Version' --output text)
          GET_VERSION=$(aws lambda list-versions-by-function --function-name get-tasks --query 'Versions[-1].Version' --output text)
          UPDATE_VERSION=$(aws lambda list-versions-by-function --function-name update-task --query 'Versions[-1].Version' --output text)
          DELETE_VERSION=$(aws lambda list-versions-by-function --function-name delete-task --query 'Versions[-1].Version' --output text)
          WORKER_VERSION=$(aws lambda list-versions-by-function --function-name sqs-worker --query 'Versions[-1].Version' --output text)
          
          # Update staging aliases (create if doesn't exist)
          aws lambda update-alias --function-name create-task --name staging --function-version $CREATE_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name create-task --name staging --function-version $CREATE_VERSION
          
          aws lambda update-alias --function-name get-tasks --name staging --function-version $GET_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name get-tasks --name staging --function-version $GET_VERSION
          
          aws lambda update-alias --function-name update-task --name staging --function-version $UPDATE_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name update-task --name staging --function-version $UPDATE_VERSION
          
          aws lambda update-alias --function-name delete-task --name staging --function-version $DELETE_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name delete-task --name staging --function-version $DELETE_VERSION
          
          aws lambda update-alias --function-name sqs-worker --name staging --function-version $WORKER_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name sqs-worker --name staging --function-version $WORKER_VERSION
      
      - name: Run smoke tests on staging
        run: |
          sleep 10
          python3 tests/test_smoke.py
        env:
          API_URL: https://nqo9rfa75i.execute-api.us-east-1.amazonaws.com/prod/tasks

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to Production with gradual traffic shift
        run: |
          # Get latest versions (same as staging)
          CREATE_VERSION=$(aws lambda list-versions-by-function --function-name create-task --query 'Versions[-1].Version' --output text)
          GET_VERSION=$(aws lambda list-versions-by-function --function-name get-tasks --query 'Versions[-1].Version' --output text)
          UPDATE_VERSION=$(aws lambda list-versions-by-function --function-name update-task --query 'Versions[-1].Version' --output text)
          DELETE_VERSION=$(aws lambda list-versions-by-function --function-name delete-task --query 'Versions[-1].Version' --output text)
          WORKER_VERSION=$(aws lambda list-versions-by-function --function-name sqs-worker --query 'Versions[-1].Version' --output text)
          
          # Update production aliases with gradual shift (10% -> 50% -> 100%)
          echo "Shifting 10% traffic to new version..."
          aws lambda update-alias --function-name create-task --name prod --function-version $CREATE_VERSION --routing-config AdditionalVersionWeights={$CREATE_VERSION=0.1} 2>/dev/null || \
            aws lambda create-alias --function-name create-task --name prod --function-version $CREATE_VERSION
          
          sleep 30
          
          echo "Shifting 50% traffic to new version..."
          aws lambda update-alias --function-name create-task --name prod --function-version $CREATE_VERSION --routing-config AdditionalVersionWeights={$CREATE_VERSION=0.5}
          
          sleep 30
          
          echo "Shifting 100% traffic to new version..."
          aws lambda update-alias --function-name create-task --name prod --function-version $CREATE_VERSION
          aws lambda update-alias --function-name get-tasks --name prod --function-version $GET_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name get-tasks --name prod --function-version $GET_VERSION
          aws lambda update-alias --function-name update-task --name prod --function-version $UPDATE_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name update-task --name prod --function-version $UPDATE_VERSION
          aws lambda update-alias --function-name delete-task --name prod --function-version $DELETE_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name delete-task --name prod --function-version $DELETE_VERSION
          aws lambda update-alias --function-name sqs-worker --name prod --function-version $WORKER_VERSION 2>/dev/null || \
            aws lambda create-alias --function-name sqs-worker --name prod --function-version $WORKER_VERSION
      
      - name: Monitor for errors (5 minutes)
        run: |
          echo "Monitoring production for 5 minutes..."
          sleep 300
          
          # Check Lambda error metrics
          ERROR_COUNT=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Errors \
            --dimensions Name=FunctionName,Value=create-task \
            --start-time $(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 300 \
            --statistics Sum \
            --query 'Datapoints[0].Sum' \
            --output text)
          
          if [ "$ERROR_COUNT" != "None" ] && [ "$ERROR_COUNT" -gt 5 ]; then
            echo "ERROR: High error rate detected! Triggering rollback..."
            exit 1
          fi
          
          echo "✅ Production deployment successful!"
